name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/rag_test
      QDRANT_URL: http://localhost:6333
      LM_STUDIO_BASE_URL: http://localhost:1234/v1
      LM_STUDIO_API_KEY: lm-studio
      LM_STUDIO_CHAT_MODEL: ci-placeholder-chat-model
      LM_STUDIO_EMBEDDING_MODEL: ci-placeholder-embedding-model

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Ruff
        run: ruff check .

      - name: Run tests
        run: pytest

      - name: Validate Docker image
        run: docker build --tag ai-rag-platform:ci .
